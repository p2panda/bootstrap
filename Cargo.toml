[package]
name = "bootstrap"
version = "0.2.1"
edition = "2024"

[profile.release]
strip = true
lto = "fat"
codegen-units = 1

[dependencies]
anyhow = "1.0.98"
clap = { version = "4.5.37", features = ["derive"] }
hex = "0.4.3"
p2panda-core = { version = "0.5.1", default-features = false }
p2panda-discovery = { version = "0.5.1", default-features = false }
p2panda-net = { version = "0.5.1", default-features = false, features = ["address_book", "iroh_endpoint", "discovery"] }
rand_chacha = "0.9.0"
tokio = { version = "1.49.0", features = ["rt-multi-thread"] }
tracing = "0.1.41"
tracing-subscriber = { version = "0.3.20", features = ["env-filter"] }

[dev-dependencies]
tempfile = "3.19.1"
